name: Generate Weekly Digest

on:
  schedule:
    - cron: '0 7 * * 1'   # every Monday at 7:00 AM UTC
  workflow_dispatch:

jobs:
  digest:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./czar

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: czar/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate digest
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: python pipeline/scheduler.py --digest-only

      - name: Upload digest artifact
        uses: actions/upload-artifact@v4
        with:
          name: weekly-digest-${{ github.run_number }}
          path: czar/pipeline/outputs/
          retention-days: 30
